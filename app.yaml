# =============================================================================
# app.yaml — Databricks App manifest for DBDE AI Assistant
# =============================================================================

command:
  - uvicorn
  - app:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  - name: APP_ENV
    value: databricks
  - name: AGENT_MAX_ITERATIONS
    value: "15"
  - name: AGENT_TEMPERATURE
    value: "0.3"
  - name: AGENT_MAX_TOKENS
    value: "4096"
  - name: PII_ENABLED
    value: "false"
  - name: CODE_INTERPRETER_ENABLED
    value: "true"
  - name: DEVOPS_ORG
    value: "ptbcp"
  - name: DEVOPS_PROJECT
    value: "IT.DIT"
  # ---------------------------------------------------------------------------
  # External API tokens (Azure DevOps / Figma / Miro) — OPTIONAL.
  # The app boots fine WITHOUT these: the DevOps/Figma/Miro tools simply stay
  # disabled (graceful degradation in tool_registry). Do NOT hardcode tokens.
  #
  # To ENABLE them: create the secrets in the KeyVault-backed scope
  # `DataBricksKVScopeDataQ` (via the Azure KeyVault portal — this scope is
  # read-only from the Databricks CLI), with keys devops-pat / figma-token /
  # miro-token, then UNCOMMENT the matching env entries below AND the secret
  # resource blocks further down. Leaving valueFrom pointing at a non-existent
  # secret makes the whole app deployment fail, so they stay commented by default.
  # ---------------------------------------------------------------------------
  # - name: DEVOPS_PAT
  #   valueFrom: devops-pat
  # - name: FIGMA_ACCESS_TOKEN
  #   valueFrom: figma-token
  # - name: MIRO_ACCESS_TOKEN
  #   valueFrom: miro-token

resources:
  # Uncomment together with the env entries above, once the secrets exist:
  # - name: devops-pat
  #   secret:
  #     scope: DataBricksKVScopeDataQ
  #     key: devops-pat
  #     permission: READ
  # - name: figma-token
  #   secret:
  #     scope: DataBricksKVScopeDataQ
  #     key: figma-token
  #     permission: READ
  # - name: miro-token
  #   secret:
  #     scope: DataBricksKVScopeDataQ
  #     key: miro-token
  #     permission: READ

  - name: llm_primary
    serving_endpoint:
      name: databricks-claude-sonnet-4-6
      permission: CAN_QUERY

  - name: llm_fast
    serving_endpoint:
      name: databricks-claude-haiku-4-5
      permission: CAN_QUERY

  - name: llm_pro
    serving_endpoint:
      name: databricks-claude-opus-4-8
      permission: CAN_QUERY

  - name: embedding
    serving_endpoint:
      name: databricks-gte-large-en
      permission: CAN_QUERY

  - name: lakebase
    postgres:
      permission: CAN_CONNECT_AND_CREATE
