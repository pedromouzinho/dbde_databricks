<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBDE AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--brand:#D1005D;--brand-rgb:209,0,93;--bg:#F4F1EB;--card:#fff;--muted:#F1ECE4;--text:#1A1E27;--text2:#3D4351;--text3:#697180;--text4:#959EAA;--border:rgba(20,24,32,0.08);--border2:rgba(20,24,32,0.14);--shadow:0 12px 32px rgba(24,20,24,0.06);--r-lg:24px;--r-md:18px;--r-sm:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:linear-gradient(180deg,#F8F6F1,#EFE9E1);color:var(--text);overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:rgba(var(--brand-rgb),0.14)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}

.shell{display:flex;height:100vh;background:radial-gradient(circle at top right,rgba(var(--brand-rgb),0.05),transparent 30%),var(--bg)}

/* SIDEBAR */
.sb{width:272px;min-width:272px;background:linear-gradient(180deg,rgba(255,253,249,0.97),rgba(246,241,234,0.99));border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:20px 18px 14px;display:flex;align-items:center;gap:11px}
.sb-icon{width:34px;height:34px;border-radius:9px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
.sb-brand span{display:block}.sb-brand .t{font-size:13px;font-weight:700}.sb-brand .s{font-size:10px;color:var(--text4)}
.sb-new{margin:0 14px 14px;padding:12px;border:none;border-radius:var(--r-sm);background:var(--brand);color:#fff;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .2s}.sb-new:hover{opacity:.88}
.sb-label{padding:4px 18px;font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.5px}
.sb-list{flex:1;overflow-y:auto;padding:4px 8px;display:flex;flex-direction:column;gap:1px}
.sb-item{padding:9px 11px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;gap:1px;transition:background .15s;font-size:12px;color:var(--text2)}
.sb-item:hover{background:var(--muted)}
.sb-item.active{background:rgba(var(--brand-rgb),.07);color:var(--brand);font-weight:600}
.sb-item .t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item .d{font-size:10px;color:var(--text4)}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--text4);text-align:center}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hdr{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.65);backdrop-filter:blur(10px)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr h2{font-size:14px;font-weight:700;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.menu-btn{display:none;width:34px;height:34px;border:none;border-radius:8px;background:transparent;cursor:pointer;color:var(--text3);align-items:center;justify-content:center}
.tiers{display:flex;gap:2px;background:var(--muted);border-radius:18px;padding:3px}
.tier{padding:6px 14px;border:none;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:var(--text3);transition:all .2s;display:flex;align-items:center;gap:5px}
.tier.on{background:var(--card);color:var(--brand);box-shadow:0 2px 6px rgba(0,0,0,.05)}
.tier i{width:6px;height:6px;border-radius:50%;display:inline-block}
.tier[data-t=standard] i{background:#4CAF50}.tier[data-t=fast] i{background:#FF9800}.tier[data-t=pro] i{background:#9C27B0}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:20px 20px 12px;display:flex;flex-direction:column;gap:16px}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:32px;animation:fadeUp .5s}
.empty-icon{width:50px;height:50px;border-radius:13px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;margin-bottom:14px}
.empty-k{font-size:11px;font-weight:700;color:var(--brand);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.empty-t{font-size:22px;font-weight:800;margin-bottom:6px}
.empty-d{font-size:13px;color:var(--text3);margin-bottom:24px;max-width:400px}
.empty-hr{width:36px;height:3px;background:var(--brand);border-radius:3px;margin:0 auto 22px}
.sug-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;max-width:580px;width:100%}
.sug{padding:14px 15px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--card);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;text-align:left;line-height:1.4;transition:all .2s}.sug:hover{border-color:var(--brand);box-shadow:0 4px 14px rgba(var(--brand-rgb),.08);transform:translateY(-1px)}

/* MSG */
.msg{max-width:74%;animation:fadeUp .25s}
.msg.u{align-self:flex-end}
.msg.a{align-self:flex-start}
.bubble{padding:13px 17px;border-radius:var(--r-md);line-height:1.6;font-size:13.5px;word-wrap:break-word}
.msg.u .bubble{background:var(--brand);color:#fff;border-bottom-right-radius:5px}
.msg.a .bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:5px;box-shadow:0 3px 12px rgba(0,0,0,.03)}
.bubble h1,.bubble h2,.bubble h3{margin:12px 0 6px;font-weight:700}.bubble h1{font-size:16px}.bubble h2{font-size:14px}.bubble h3{font-size:13px}
.bubble p{margin:5px 0}.bubble ul,.bubble ol{margin:6px 0 6px 20px}.bubble li{margin:3px 0}
.bubble code{background:rgba(0,0,0,.05);padding:2px 6px;border-radius:4px;font-size:11.5px;font-family:'SF Mono',Consolas,monospace}
.bubble pre{background:#1e1e2e;color:#cdd6f4;padding:14px;border-radius:10px;overflow-x:auto;margin:10px 0;font-size:11.5px;line-height:1.5}
.bubble pre code{background:none;padding:0;color:inherit}
.bubble table{border-collapse:collapse;margin:8px 0;font-size:12px;width:100%}.bubble th,.bubble td{border:1px solid var(--border2);padding:6px 10px;text-align:left}.bubble th{background:var(--muted);font-weight:600}
.bubble blockquote{border-left:3px solid var(--brand);padding:6px 12px;margin:8px 0;background:rgba(var(--brand-rgb),.03);border-radius:0 8px 8px 0;font-size:13px}
.bubble a{color:var(--brand)}

/* TOOL ROW */
.tools-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;align-items:center}
.chip{padding:3px 9px;border-radius:10px;font-size:10px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.chip.t{background:rgba(var(--brand-rgb),.08);color:var(--brand)}.chip.m{background:rgba(0,0,0,.04);color:var(--text3)}

/* SPINNER (shared) */
.spin{border:2.5px solid rgba(var(--brand-rgb),.15);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* TOASTS */
.toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:2000;align-items:center}
.toast{background:#1A1E27;color:#fff;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.18);animation:fadeUp .25s;max-width:90vw}

/* ARTIFACTS (downloads + charts) */
.arts{display:flex;flex-direction:column;gap:8px;margin-top:9px}
.dl-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border:1px solid rgba(var(--brand-rgb),.18);border-radius:10px;background:rgba(var(--brand-rgb),.04);color:var(--brand);font-size:12px;font-weight:600;text-decoration:none;transition:all .15s;width:fit-content;max-width:100%}
.dl-btn:hover{background:rgba(var(--brand-rgb),.09);transform:translateY(-1px)}
.dl-btn .ic{font-size:15px}
.dl-btn .meta{color:var(--text4);font-weight:500;font-size:10.5px}
.chart-box{border:1px solid var(--border);border-radius:var(--r-sm);background:var(--card);padding:8px;box-shadow:0 3px 12px rgba(0,0,0,.03);min-height:260px}

/* MSG FOOTER */
.msg-foot{display:flex;align-items:center;gap:6px;margin-top:6px}
.fb{border:none;background:transparent;cursor:pointer;padding:3px 5px;border-radius:5px;font-size:14px;opacity:.4;transition:opacity .2s}.fb:hover,.fb.on{opacity:1}
.copy-btn{border:none;background:transparent;cursor:pointer;padding:3px 5px;border-radius:5px;font-size:11px;color:var(--text4);transition:color .2s}.copy-btn:hover{color:var(--brand)}

/* STREAM */
.stream{align-self:flex-start;display:flex;align-items:center;gap:9px;padding:10px 16px;animation:fadeUp .2s}
.stream .spin{width:14px;height:14px;border:2.5px solid rgba(var(--brand-rgb),.15);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
.stream .lbl{font-size:12px;color:var(--text3);font-weight:500}
.stream .tool{font-size:11px;color:var(--brand);font-weight:600;margin-left:2px}

/* INPUT */
.inp-area{padding:14px 20px;background:rgba(255,255,255,.65);backdrop-filter:blur(10px);border-top:1px solid var(--border)}
.inp-uploads{max-width:760px;margin:0 auto 8px;display:flex;gap:6px;flex-wrap:wrap}
.inp-file{display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(var(--brand-rgb),.05);border:1px solid rgba(var(--brand-rgb),.12);border-radius:8px;font-size:11px;font-weight:600;color:var(--brand)}
.inp-file .x{cursor:pointer;opacity:.6;font-size:13px}.inp-file .x:hover{opacity:1}
.inp-file.img{padding:4px 8px 4px 4px}
.inp-file.img img{width:30px;height:30px;border-radius:6px;object-fit:cover;display:block}
.inp-box.drag{border-color:var(--brand);background:rgba(var(--brand-rgb),.05)}
.msg-atts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.msg.u .msg-atts{justify-content:flex-end}
.att-img img{max-width:210px;max-height:210px;border-radius:12px;border:1px solid var(--border);display:block}
.att-video{max-width:270px;max-height:230px;border-radius:12px;border:1px solid var(--border);background:#000}
.inp-box{max-width:760px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-md);padding:9px 13px;box-shadow:var(--shadow);transition:border-color .2s}
.inp-box:focus-within{border-color:var(--brand)}
.inp-box textarea{flex:1;border:none;outline:none;resize:none;font-size:13.5px;font-family:inherit;min-height:22px;max-height:130px;line-height:1.5;color:var(--text);background:transparent}.inp-box textarea::placeholder{color:var(--text4)}
.ib{width:34px;height:34px;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ib-attach{background:transparent;color:var(--text3)}.ib-attach:hover{color:var(--brand);background:rgba(var(--brand-rgb),.05)}
.ib-send{background:var(--brand);color:#fff}.ib-send:hover{transform:scale(1.05)}.ib-send:disabled{opacity:.3;cursor:not-allowed;transform:none}
.ib-stop{background:#e53935;color:#fff}.ib-stop:hover{background:#c62828}

@media(max-width:768px){.sb{position:fixed;left:-290px;top:0;bottom:0;z-index:1100;transition:left .3s}.sb.open{left:0}.menu-btn{display:flex}.sug-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
<aside class="sb" id="sb">
  <div class="sb-head"><div class="sb-icon">M</div><div class="sb-brand"><span class="t">DBDE Assistant</span><span class="s">Databricks Edition</span></div></div>
  <button class="sb-new" onclick="newChat()"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="6" y1="0" x2="6" y2="12"/><line x1="0" y1="6" x2="12" y2="6"/></svg>Nova conversa</button>
  <div class="sb-label">Recentes</div>
  <div class="sb-list" id="sbList"></div>
  <div class="sb-foot">v8.0 · Databricks · Claude Sonnet</div>
</aside>
<main class="main">
  <header class="hdr">
    <div class="hdr-left">
      <button class="menu-btn" onclick="document.getElementById('sb').classList.toggle('open')">☰</button>
      <h2 id="title">Nova conversa</h2>
    </div>
    <div class="tiers" id="tiers">
      <button class="tier on" data-t="standard" onclick="setTier('standard')"><i></i>Standard</button>
      <button class="tier" data-t="fast" onclick="setTier('fast')"><i></i>Fast</button>
      <button class="tier" data-t="pro" onclick="setTier('pro')"><i></i>Pro</button>
    </div>
  </header>
  <div class="chat" id="chat"></div>
  <div class="inp-area">
    <div class="inp-uploads" id="uploads"></div>
    <div class="inp-box">
      <button class="ib ib-attach" onclick="document.getElementById('fIn').click()" title="Anexar"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13.5 10.5l-5 5a3.5 3.5 0 01-5-5l7-7a2.5 2.5 0 013.5 3.5l-7 7a1.2 1.2 0 01-1.7-1.7l5-5"/></svg></button>
      <textarea id="inp" placeholder="Escreve uma mensagem..." rows="1"></textarea>
      <button class="ib ib-send" id="sendBtn" onclick="send()" disabled><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
    <input type="file" id="fIn" multiple hidden>
  </div>
</main>
</div>
<div class="toasts" id="toasts"></div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/vendor/plotly.min.js"></script>
<script>

// ============ STATE ============
let tier='standard', convId=null, busy=false, abortCtrl=null;
let files=[], convs=[];
// Attachment config (client-side; mirrors config_databricks defaults).
const VIDEO_MAX_FRAMES=6, VIDEO_MAX_BYTES=26214400, ATTACH_EDGE=1024;
const SUGS=[
  [{i:'🏗️',t:'Mostra a estrutura da Epic 1046350'},{i:'🐛',t:'Bugs abertos na area RevampFEE'},{i:'📝',t:'Gera 3 user stories para login biométrico'},{i:'📊',t:'Exporta backlog em Excel'}],
  [{i:'🔍',t:'Resume os work items do sprint atual'},{i:'📑',t:'Cria apresentação sobre o projeto'},{i:'📈',t:'Analisa padrões de bugs recentes'},{i:'📧',t:'Prepara email de status update'}],
];
let sugP=0;

// ============ INIT ============
(async()=>{
  marked.setOptions({breaks:true,gfm:true});
  setupInput();
  showEmpty();
  await loadConvs();
})();

function setupInput(){
  const inp=document.getElementById('inp');
  inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,130)+'px';updBtn()});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
  document.getElementById('fIn').addEventListener('change',handleFiles);
  // Colar (Ctrl+V) imagens/ficheiros directamente do clipboard.
  inp.addEventListener('paste',e=>{
    const items=(e.clipboardData&&e.clipboardData.items)||[];
    const pasted=[];
    for(const it of items){if(it.kind==='file'){const f=it.getAsFile();if(f)pasted.push(f);}}
    if(pasted.length){e.preventDefault();if(!convId)convId=crypto.randomUUID();pasted.forEach(addAttachment);}
  });
  // Arrastar e largar sobre a caixa de input.
  const box=document.querySelector('.inp-box');
  ['dragenter','dragover'].forEach(ev=>box.addEventListener(ev,e=>{e.preventDefault();box.classList.add('drag')}));
  ['dragleave','dragend'].forEach(ev=>box.addEventListener(ev,e=>{box.classList.remove('drag')}));
  box.addEventListener('drop',e=>{
    e.preventDefault();box.classList.remove('drag');
    const fs=(e.dataTransfer&&e.dataTransfer.files)||[];
    if(fs.length){if(!convId)convId=crypto.randomUUID();for(const f of fs)addAttachment(f);}
  });
}
function updBtn(){document.getElementById('sendBtn').disabled=!document.getElementById('inp').value.trim()&&!files.length||busy}
function setTier(t){tier=t;document.querySelectorAll('.tier').forEach(b=>b.classList.toggle('on',b.dataset.t===t))}

// ============ CONVERSATIONS ============
async function loadConvs(){
  try{const r=await fetch('/api/conversations');const d=await r.json();convs=d.conversations||[];renderSb()}catch(e){convs=[]}
}
function renderSb(){
  document.getElementById('sbList').innerHTML=convs.map(c=>`<div class="sb-item ${c.id===convId?'active':''}" onclick="openConv('${c.id}')"><div class="t">${esc(c.title||'Sem título')}</div><div class="d">${c.message_count||0} msgs</div></div>`).join('');
}
async function openConv(id){
  convId=id;
  const r=await fetch(`/api/conversations/${id}/messages`);
  const d=await r.json();
  document.getElementById('chat').innerHTML='';
  document.getElementById('title').textContent=d.title||'Conversa';
  (d.messages||[]).forEach(m=>renderMsg(m.role,m.content,{images:m.images||[]}));
  renderSb();
}
function newChat(){convId=null;files=[];showEmpty();document.getElementById('title').textContent='Nova conversa';renderSb()}

// ============ EMPTY STATE ============
function showEmpty(){
  const s=SUGS[sugP++%SUGS.length];
  document.getElementById('chat').innerHTML=`<div class="empty"><div class="empty-icon">M</div><div class="empty-k">Assistente AI DBDE</div><div class="empty-t">Como te posso ajudar?</div><div class="empty-d">DevOps, user stories, ficheiros, apresentações, Figma, Miro e mais.</div><div class="empty-hr"></div><div class="sug-grid">${s.map(x=>`<button class="sug" onclick="useSug(this.dataset.v)" data-v="${x.t.replace(/"/g,'&quot;')}">${x.i} ${esc(x.t)}</button>`).join('')}</div></div>`;
}
function useSug(t){document.getElementById('inp').value=t;updBtn();send()}

// ============ FILE UPLOAD ============
async function handleFiles(e){
  // Ensure a conversation id exists BEFORE uploading, so the backend indexes the
  // document under the same conv_id used when chatting (search_uploaded_document
  // needs it). Without this, uploads before the first message are never indexed.
  if(!convId)convId=crypto.randomUUID();
  for(const f of e.target.files)await addAttachment(f);
  e.target.value='';renderUploads();updBtn();
}

// Upload a single File to the backend, returning the server entry (upload_id, kind, url, ...).
async function uploadOne(file){
  const form=new FormData();form.append('file',file);form.append('conversation_id',convId||'');
  const r=await fetch('/api/upload',{method:'POST',body:form});
  const d=await r.json();
  if(!d||!d.upload_id)throw new Error((d&&d.error)||'upload falhou');
  return d;
}

// Add any dropped/pasted/picked file. Images upload directly; videos are decoded in
// the browser to keyframes (sent as images) + the original stored for playback.
async function addAttachment(f){
  if(!convId)convId=crypto.randomUUID();
  const isVideo=(f.type&&f.type.startsWith('video/'))||/\.(mp4|webm|mov|m4v|ogg)$/i.test(f.name||'');
  const fname=f.name||('colado-'+Date.now()+'.'+((f.type||'image/png').split('/')[1]||'png'));
  const file=f.name?f:new File([f],fname,{type:f.type||'image/png'});
  const ph={filename:fname,_uploading:true};
  files.push(ph);renderUploads();updBtn();
  try{
    if(isVideo){
      if(file.size>VIDEO_MAX_BYTES)throw new Error('vídeo demasiado grande (máx '+Math.round(VIDEO_MAX_BYTES/1048576)+'MB)');
      const frames=await extractVideoFrames(file);
      const frameIds=[];
      for(let k=0;k<frames.length;k++){
        const fr=new File([frames[k]],`frame_${k+1}.jpg`,{type:'image/jpeg'});
        try{const fd=await uploadOne(fr);if(fd&&fd.upload_id)frameIds.push(fd.upload_id);}catch(_){}
      }
      const vid=await uploadOne(file);vid.kind='video';vid.frameIds=frameIds;
      replacePh(ph,vid);
    }else{
      replacePh(ph,await uploadOne(file));
    }
  }catch(err){
    rmPh(ph);toast('⚠️ Falha no anexo '+(fname)+': '+(err.message||err));
  }
  renderUploads();updBtn();
}
function replacePh(ph,entry){const i=files.indexOf(ph);if(i>-1)files[i]=entry;else files.push(entry);}
function rmPh(ph){const i=files.indexOf(ph);if(i>-1)files.splice(i,1);}
function rmFile(i){files.splice(i,1);renderUploads();updBtn();}

// Extract up to VIDEO_MAX_FRAMES evenly-spaced JPEG keyframes from a video, fully in
// the browser (HTMLVideoElement + canvas) — zero server/external dependencies.
function extractVideoFrames(file){
  return new Promise((resolve)=>{
    const url=URL.createObjectURL(file);
    const video=document.createElement('video');
    video.preload='metadata';video.muted=true;video.playsInline=true;video.src=url;
    const frames=[];
    const done=()=>{URL.revokeObjectURL(url);resolve(frames)};
    video.onloadedmetadata=()=>{
      const dur=video.duration||0;
      if(!isFinite(dur)||dur<=0)return done();
      const n=VIDEO_MAX_FRAMES,times=[];
      for(let i=0;i<n;i++)times.push(dur*(n===1?0.5:(0.05+0.9*i/(n-1))));
      const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');
      let idx=0;
      const seekNext=()=>{if(idx>=times.length)return done();video.currentTime=times[idx]};
      video.onseeked=()=>{
        const vw=video.videoWidth||0,vh=video.videoHeight||0;
        if(vw&&vh){
          let w=vw,h=vh;if(Math.max(w,h)>ATTACH_EDGE){const s=ATTACH_EDGE/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s)}
          canvas.width=w;canvas.height=h;ctx.drawImage(video,0,0,w,h);
          canvas.toBlob(b=>{if(b)frames.push(b);idx++;seekNext()},'image/jpeg',0.7);
        }else{idx++;seekNext()}
      };
      video.onerror=done;
      seekNext();
    };
    video.onerror=done;
  });
}

function renderUploads(){
  document.getElementById('uploads').innerHTML=files.map((f,i)=>{
    if(f._uploading)return `<div class="inp-file"><span class="spin" style="width:11px;height:11px;border-width:2px"></span><span>${esc(f.filename)} — a processar…</span></div>`;
    if(f.kind==='image')return `<div class="inp-file img"><img src="${f.url}" alt=""><span>${esc(f.filename)}</span><span class="x" onclick="rmFile(${i})">×</span></div>`;
    if(f.kind==='video')return `<div class="inp-file"><span>🎬 ${esc(f.filename)} · ${(f.frameIds||[]).length} frames</span><span class="x" onclick="rmFile(${i})">×</span></div>`;
    const rows=f.rows?` · ${f.rows} linhas`:'';
    const cols=(f.columns&&f.columns.length)?` · ${f.columns.length} colunas`:'';
    const idx=f.indexed?' <span title="Indexado para pesquisa semântica" style="opacity:.8">🔎</span>':'';
    return `<div class="inp-file"><span>📎 ${esc(f.filename)}${rows}${cols}${idx}</span><span class="x" onclick="rmFile(${i})">×</span></div>`;
  }).join('');
}

// ============ SEND ============
async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();
  if(!text&&!files.length||busy)return;
  if(files.some(f=>f._uploading)){toast('Aguarda o processamento dos anexos…');return;}

  // Remove empty state
  const em=document.querySelector('.empty');if(em)em.remove();
  if(!convId)convId=crypto.randomUUID();

  // Vision: image ids (uploaded images + browser-extracted video keyframes) are sent
  // to the model natively as image blocks for THIS turn.
  const imageIds=[];
  files.forEach(f=>{if(f.kind==='image')imageIds.push(f.upload_id);else if(f.kind==='video'&&f.frameIds)imageIds.push(...f.frameIds)});
  // Visual attachments rendered in the user bubble (and kept visible in history).
  const viewAtts=files.filter(f=>f.kind==='image'||f.kind==='video').map(f=>({kind:f.kind,url:f.url,name:f.filename}));
  // Doc-type files keep the existing textual reference so tools can find them.
  const docFiles=files.filter(f=>f.kind!=='image'&&f.kind!=='video');
  let msg=text;
  if(docFiles.length){msg=docFiles.map(f=>`[Anexo: ${f.filename}${f.rows?' ('+f.rows+' linhas, colunas: '+(f.columns||[]).join(', ')+')':''}]`).join('\n')+'\n\n'+text}

  renderMsg('user',text,{images:viewAtts});
  inp.value='';inp.style.height='auto';updBtn();
  files=[];renderUploads();
  busy=true;updBtn();

  // Use streaming
  showStream('A pensar...');
  abortCtrl=new AbortController();

  try{
    const resp=await fetch('/api/chat',{
      method:'POST',signal:abortCtrl.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg,conversation_id:convId,tier,stream:true,image_ids:imageIds})
    });

    if(resp.headers.get('content-type')?.includes('text/event-stream')){
      // SSE streaming
      const reader=resp.body.getReader();
      const decoder=new TextDecoder();
      let buffer='',fullContent='',toolsUsed=[],artifacts=[];

      hideStream();
      const msgEl=startAssistantMsg();

      try{
        while(true){
          const{done,value}=await reader.read();
          if(done)break;
          buffer+=decoder.decode(value,{stream:true});
          const lines=buffer.split('\n');
          buffer=lines.pop();
          for(const line of lines){
            if(!line.startsWith('data: '))continue;
            try{
              const ev=JSON.parse(line.slice(6));
              if(ev.type==='content'||ev.type==='delta'){fullContent+=(ev.delta||ev.content||'');updateMsgContent(msgEl,fullContent)}
              else if(ev.type==='tool_start'){showStream(`🔧 ${ev.name}...`);toolsUsed.push(ev.name)}
              else if(ev.type==='tool_end'){hideStream()}
              else if(ev.type==='artifact'){if(ev.artifact)artifacts.push(ev.artifact)}
              else if(ev.type==='done'){if(ev.tools_used)toolsUsed=ev.tools_used}
              else if(ev.type==='error'){fullContent+='\n⚠️ '+ev.message;updateMsgContent(msgEl,fullContent)}
            }catch(pe){}
          }
        }
      }catch(se){if(se.name!=='AbortError')fullContent+='\n⚠️ Stream interrupted'}
      if(!fullContent){fullContent='⚠️ Sem resposta do servidor. Tenta novamente.'}
      finishAssistantMsg(msgEl,toolsUsed,artifacts);
    } else {
      // Non-streaming fallback (JSON response or error)
      hideStream();
      try{
        const data=await resp.json();
        if(data.error){renderMsg('assistant','⚠️ '+data.error)}
        else{renderMsg('assistant',data.message||'Resposta vazia',{tools:data.tools_used||[],model:data.model||'',tier:data.tier_used||tier,artifacts:data.artifacts||[]})}
      }catch(je){renderMsg('assistant','⚠️ Erro ao processar resposta')}
    }
    // Update conversation title
    document.getElementById('title').textContent=text.slice(0,50);
    loadConvs();
  }catch(err){
    hideStream();
    if(err.name!=='AbortError')renderMsg('assistant','❌ Erro: '+err.message);
  }
  busy=false;abortCtrl=null;updBtn();inp.focus();
}

function stopGen(){if(abortCtrl){abortCtrl.abort();hideStream();busy=false;updBtn()}}

// ============ RENDER ============
function renderMsg(role,content,meta){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className='msg '+(role==='user'?'u':'a');
  if(role==='assistant'){
    let html='';
    if(meta&&meta.tools&&meta.tools.length){
      html+=`<div class="tools-row"><span class="chip t">🔧 ${meta.tools.length} tool(s): ${meta.tools.join(', ')}</span>`;
      if(meta.model)html+=`<span class="chip m">${meta.model.split('.').pop()}</span>`;
      if(meta.tier)html+=`<span class="chip m">${meta.tier}</span>`;
      html+='</div>';
    }
    html+=`<div class="bubble">${renderMd(content)}</div>`;
    html+=`<div class="msg-foot"><button class="fb" onclick="fb(this,1,'${convId}')">👍</button><button class="fb" onclick="fb(this,-1,'${convId}')">👎</button><button class="copy-btn" onclick="copyMsg(this)">📋 Copiar</button></div>`;
    div.innerHTML=html;
  } else {
    let html='';
    if(meta&&meta.images&&meta.images.length)html+=attachHtml(meta.images);
    if(content)html+=`<div class="bubble">${esc(content).replace(/\n/g,'<br>')}</div>`;
    div.innerHTML=html||'<div class="bubble"></div>';
  }
  chat.appendChild(div);
  if(role==='assistant'&&meta&&meta.artifacts)renderArtifacts(div,meta.artifacts);
  chat.scrollTop=chat.scrollHeight;
}

// Render image/video attachments (thumbnails + inline player).
function attachHtml(images){
  return `<div class="msg-atts">`+(images||[]).map(a=>{
    if(a.kind==='video')return `<video class="att-video" src="${a.url}" controls preload="metadata"></video>`;
    return `<a class="att-img" href="${a.url}" target="_blank" rel="noopener"><img src="${a.url}" alt="${esc(a.name||'')}" loading="lazy"></a>`;
  }).join('')+`</div>`;
}

// ============ ARTIFACTS ============
function renderArtifacts(msgDiv,artifacts){
  if(!artifacts||!artifacts.length)return;
  const wrap=document.createElement('div');wrap.className='arts';
  const charts=[];
  artifacts.forEach(a=>{
    if(a.kind==='file'){
      const ep=a.endpoint||('/api/download/'+a.download_id);
      const link=document.createElement('a');
      link.className='dl-btn';link.href=ep;link.setAttribute('download',a.filename||'');
      link.innerHTML=`<span class="ic">📥</span><span>${esc(a.filename||'ficheiro')}</span><span class="meta">${esc((a.format||'').toUpperCase())} · ${fmtSize(a.size_bytes)}</span>`;
      wrap.appendChild(link);
    } else if(a.kind==='chart'&&a.spec){
      const box=document.createElement('div');box.className='chart-box';
      const id='chart_'+Math.random().toString(36).slice(2);box.id=id;
      wrap.appendChild(box);charts.push([id,a.spec]);
    }
  });
  const foot=msgDiv.querySelector('.msg-foot');
  if(foot)msgDiv.insertBefore(wrap,foot);else msgDiv.appendChild(wrap);
  charts.forEach(([id,spec])=>{
    try{
      if(window.Plotly)Plotly.newPlot(id,spec.data||[],spec.layout||{},Object.assign({displayModeBar:false,responsive:true},spec.config||{}));
      else document.getElementById(id).innerHTML='<span style="color:var(--text4);font-size:12px">Gráfico indisponível (Plotly não carregou).</span>';
    }catch(e){const el=document.getElementById(id);if(el)el.innerHTML='<span style="color:var(--text4);font-size:12px">Erro ao renderizar gráfico.</span>';}
  });
}
function fmtSize(b){b=+b||0;if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';return (b/1048576).toFixed(1)+' MB';}

function startAssistantMsg(){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');div.className='msg a';
  div.innerHTML='<div class="bubble"></div>';
  chat.appendChild(div);return div;
}
function updateMsgContent(el,content){
  const bubble=el.querySelector('.bubble');
  bubble.innerHTML=renderMd(content);
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}
function finishAssistantMsg(el,tools,artifacts){
  // Add tools row and footer
  const bubble=el.querySelector('.bubble');
  let pre='';
  if(tools&&tools.length)pre=`<div class="tools-row"><span class="chip t">🔧 ${[...new Set(tools)].join(', ')}</span></div>`;
  el.innerHTML=pre+`<div class="bubble">${bubble.innerHTML}</div><div class="msg-foot"><button class="fb" onclick="fb(this,1,'${convId}')">👍</button><button class="fb" onclick="fb(this,-1,'${convId}')">👎</button><button class="copy-btn" onclick="copyMsg(this)">📋 Copiar</button></div>`;
  if(artifacts&&artifacts.length)renderArtifacts(el,artifacts);
}

function showStream(label){
  hideStream();
  const chat=document.getElementById('chat');
  const el=document.createElement('div');el.id='stm';el.className='stream';
  el.innerHTML=`<div class="spin"></div><span class="lbl">${label}</span><button class="ib ib-stop" onclick="stopGen()" title="Parar" style="width:26px;height:26px;margin-left:8px"><svg width="10" height="10" fill="currentColor"><rect width="10" height="10" rx="2"/></svg></button>`;
  chat.appendChild(el);chat.scrollTop=chat.scrollHeight;
}
function hideStream(){const el=document.getElementById('stm');if(el)el.remove()}

// ============ UTILS ============
function renderMd(t){if(!t)return'';try{return marked.parse(t)}catch(e){return esc(t).replace(/\n/g,'<br>')}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg,ms){
  const c=document.getElementById('toasts');if(!c)return;
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},ms||4000);
}

function fb(btn,val,cid){
  btn.classList.add('on');
  fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({conversation_id:cid||'',message_index:0,value:val})}).catch(()=>{});
}
function copyMsg(btn){
  const bubble=btn.closest('.msg').querySelector('.bubble');
  navigator.clipboard.writeText(bubble.innerText).then(()=>{btn.textContent='✅ Copiado!';setTimeout(()=>btn.textContent='📋 Copiar',2000)});
}
</script>
